<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#060b14">
<title>Boss Timer v7.5</title>
<style>
:root{
  --bg:#060b14;
  --panel:#111a2c;
  --panel2:#0b1220;
  --panel3:#08111f;
  --border:#22324f;
  --border2:#334766;
  --text:#edf4ff;
  --muted:#8ea0bc;
  --green:#22c55e;
  --green2:#86efac;
  --yellow:#facc15;
  --red:#ef4444;
  --orange:#ff9f0a;
  --blue:#38bdf8;
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;
  background:
    radial-gradient(circle at 20% -10%,rgba(56,189,248,.13),transparent 26%),
    radial-gradient(circle at 85% 0%,rgba(255,159,10,.1),transparent 24%),
    linear-gradient(180deg,#060b14,#070d18);
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  padding:18px;
}
.wrap{max-width:1180px;margin:auto}
.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:12px;
}
.title{font-size:28px;font-weight:950;letter-spacing:-.03em}
.version{color:var(--muted);font-size:12px;font-weight:800;margin-top:3px}
.clock{text-align:right;font:950 28px ui-monospace,SFMono-Regular,Menlo,monospace}
.date{color:var(--muted);font:800 12px ui-monospace,SFMono-Regular,Menlo,monospace;margin-top:4px}
.panel{
  background:linear-gradient(180deg,rgba(17,26,44,.98),rgba(11,18,32,.98));
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:0 14px 34px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.04);
}
.topbar{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:8px;
  padding:10px;
  margin-bottom:12px;
  align-items:center;
}
.mapBox{display:flex;align-items:center;gap:8px;min-width:0}
.mapBox span{color:var(--orange);font-weight:950;white-space:nowrap}
input,button{
  font:inherit;
  border-radius:9px;
  border:1px solid var(--border2);
  background:var(--panel3);
  color:var(--text);
  outline:none;
}
input{padding:9px 10px}
input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,159,10,.12)}
#mapName{width:100%;font-weight:900}
button{
  cursor:pointer;
  padding:7px 10px;
  min-height:32px;
  font-size:12px;
  font-weight:950;
  letter-spacing:.02em;
}
button:hover{filter:brightness(1.12)}
.soundBtn,.copyBtn{background:#101a2d;color:#dbeafe;border:1px solid #304564}
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:12px;
}
.stat{padding:10px 12px}
.stat small{
  display:block;
  color:var(--muted);
  font:900 11px ui-monospace,SFMono-Regular,Menlo,monospace;
}
.stat b{
  display:block;
  margin-top:4px;
  font:950 22px ui-monospace,SFMono-Regular,Menlo,monospace;
}
.stat.counting b{color:var(--green2)}
.stat.phase b{color:var(--yellow)}
.stat.ready b{color:#ff9a9a}
.stat.next b{font-size:15px;color:#bff6ff}
.grid{
  display:flex;
  flex-direction:column;
  gap:9px;
}
.card{
  position:relative;
  overflow:hidden;
  padding:10px 12px;
  min-height:auto;
  display:grid;
  grid-template-columns:120px minmax(190px,1fr) 220px 170px 240px;
  gap:12px;
  align-items:center;
}
.card:before{
  content:"";
  position:absolute;
  inset:0 auto 0 0;
  width:4px;
  background:#475569;
}
.card.counting:before{background:linear-gradient(180deg,var(--green),var(--blue))}
.card.phase:before{background:linear-gradient(180deg,var(--yellow),var(--orange))}
.card.ready:before{background:linear-gradient(180deg,var(--red),#fb7185)}
.head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.ch{font:950 19px ui-monospace,SFMono-Regular,Menlo,monospace}
.state{
  display:inline-flex;
  align-items:center;
  gap:6px;
  color:#cbd5e1;
  font:950 10px ui-monospace,SFMono-Regular,Menlo,monospace;
}
.dot{width:8px;height:8px;border-radius:50%;background:#64748b}
.counting .dot{background:var(--green);box-shadow:0 0 12px rgba(34,197,94,.75)}
.phase .dot{background:var(--yellow);box-shadow:0 0 12px rgba(250,204,21,.75)}
.ready .dot{background:var(--red);box-shadow:0 0 12px rgba(239,68,68,.75)}
.time{
  margin:14px 0 6px;
  font:950 31px/1 ui-monospace,SFMono-Regular,Menlo,monospace;
  letter-spacing:-.06em;
}
.idle .time{color:#94a3b8}
.counting .time{color:#dcfce7}
.phase .time{color:#fef3c7}
.ready .time{color:#fecaca}
.note{
  min-height:18px;
  color:var(--muted);
  font-size:11px;
  font-weight:850;
}
.progress{
  height:7px;
  border-radius:99px;
  overflow:hidden;
  background:#060b14;
  border:1px solid #22324f;
  margin:10px 0;
}
.bar{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,var(--green),var(--blue));
  border-radius:99px;
  transition:width .25s ease;
}
.phase .bar{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.ready .bar{background:linear-gradient(90deg,var(--red),#fb7185)}
.phasebar{
  display:flex;
  gap:4px;
  margin-bottom:10px;
}
.p{
  flex:1;
  text-align:center;
  padding:3px 0;
  border-radius:6px;
  background:#07101e;
  border:1px solid #20304b;
  color:#657896;
  font:950 10px ui-monospace,SFMono-Regular,Menlo,monospace;
}
.p.on{background:#3b2b07;border-color:#a16207;color:#fde68a}
.cdEdit{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
  margin-bottom:8px;
}
.cdEdit input{
  width:100%;
  height:48px;
  padding:6px 3px;
  text-align:center;
  font:950 22px ui-monospace,SFMono-Regular,Menlo,monospace;
}
.actions{
  display:flex;
  gap:5px;
}
.actions button{flex:1;padding:6px 4px;min-height:28px}
.dead{background:var(--orange);color:#1a0900;border:0}
.adjust{background:#0c2740;color:#c8f3ff;border:1px solid #1f4d73}
.reset{background:#1f2937;color:#d1d5db;border:1px solid #374151}
.report{
  margin-top:12px;
  padding:10px;
}
.reportHead{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}
.reportTitle{font-weight:950;color:var(--orange)}
pre{
  margin:0;
  min-height:80px;
  white-space:pre-wrap;
  background:#060b14;
  border:1px solid #22324f;
  border-radius:10px;
  padding:10px;
  color:#dbeafe;
  font:900 13px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;
}
.toast{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%) translateY(14px);
  opacity:0;
  pointer-events:none;
  background:#0f172a;
  border:1px solid #334155;
  color:#e0f2fe;
  padding:10px 14px;
  border-radius:999px;
  box-shadow:0 12px 30px rgba(0,0,0,.35);
  font-weight:950;
  transition:.18s ease;
  z-index:10;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:980px){
  .card{
    grid-template-columns:90px 1fr;
    gap:8px 10px;
  }
  .phasebar,.cdEdit,.actions{
    grid-column:1/-1;
  }
}
@media(max-width:700px){
  body{padding:12px}
  .header{display:block}
  .clock{text-align:left;margin-top:8px}
  .topbar{grid-template-columns:1fr 1fr}
  .mapBox{grid-column:1/-1}
  .stats{grid-template-columns:repeat(2,1fr)}
  .card{
    grid-template-columns:1fr;
    gap:8px;
  }
  .head,.time,.note,.progress,.phasebar,.cdEdit,.actions{
    grid-column:1/-1;
  }
  .time{font-size:42px}
}

.head{
  margin:0;
}
.ch{
  font-size:22px;
}
.state{
  justify-content:flex-start;
}
.time{
  margin:0;
  font-size:38px;
  text-align:left;
}
.note{
  min-height:auto;
  text-align:left;
}
.progress{
  margin:0;
  height:10px;
}
.phasebar{
  margin:0;
}
.p{
  padding:7px 0;
}
.cdEdit{
  margin:0;
}
.cdEdit input{
  height:30px;
}
.actions{
  align-items:center;
}
.actions button{
  min-height:30px;
  padding:5px 8px;
  font-size:12px;
}
.dead{
  flex:1.4!important;
}

</style>
</head>
<body>
<div class="wrap">
  <header class="header">
    <div>
      <div class="title">Boss Timer</div>
      <div class="version">v7.5 Input UX Update</div>
    </div>
    <div>
      <div class="clock" id="clock">--:--:--</div>
      <div class="date" id="dateLine">SYSTEM TIME</div>
    </div>
  </header>

  <section class="panel topbar">
    <div class="mapBox">
      <span>MAP</span>
      <input id="mapName" value="Ranko 22" aria-label="Map name">
    </div>
    <button class="soundBtn" id="soundBtn">SOUND</button>
    <button class="copyBtn" id="copyBtn">COPY</button>
  </section>

  <section class="stats">
    <div class="panel stat counting"><small>COUNTING</small><b id="countingCount">0</b></div>
    <div class="panel stat phase"><small>PHASE</small><b id="phaseCount">0</b></div>
    <div class="panel stat ready"><small>READY</small><b id="readyCount">0</b></div>
    <div class="panel stat next"><small>NEXT</small><b id="nextInfo">--</b></div>
  </section>

  <main class="grid" id="grid"></main>

  <section class="panel report">
    <div class="reportHead">
      <div class="reportTitle">REPORT</div>
      <button class="copyBtn" id="copyBtn2">COPY REPORT</button>
    </div>
    <pre id="report">NO ACTIVE CHANNELS</pre>
  </section>
</div>

<div class="toast" id="toast">Saved</div>

<script>
const APP_KEY="bossTimerV7_4TrueReady";
const DEFAULT_CD=4*60*60*1000;
const PHASE_MS=5*60*1000;
const PHASES=4;

const grid=document.getElementById("grid");
const mapName=document.getElementById("mapName");
const report=document.getElementById("report");
const toast=document.getElementById("toast");

let audioCtx=null;
let state={mapName:"Ranko 22",channels:[]};

function pad(n){return String(n).padStart(2,"0")}
function fmtLeft(ms){
  if(ms<=0)return"00:00:00";
  let s=Math.floor(ms/1000);
  let h=Math.floor(s/3600);
  let m=Math.floor((s%3600)/60);
  let x=s%60;
  return `${pad(h)}:${pad(m)}:${pad(x)}`;
}
function fmtTime(ms){
  const d=new Date(ms);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function notify(msg){
  toast.textContent=msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),1100);
}
function beep(kind="normal"){
  try{
    audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type=kind==="ready"?"square":"sawtooth";
    o.frequency.value=kind==="ready"?1280:kind==="phase"?880:660;
    g.gain.setValueAtTime(.001,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.18,audioCtx.currentTime+.03);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.42);
    o.start();o.stop(audioCtx.currentTime+.45);
  }catch(e){}
}
function alertUser(title,msg,kind){
  beep(kind);
  if(navigator.vibrate)navigator.vibrate(kind==="ready"?[220,90,220]:[100,70,100]);
  if("Notification"in window&&Notification.permission==="granted"){
    new Notification(title,{body:msg});
  }else{
    notify(title+" // "+msg);
  }
}
function makeDefault(){
  state={
    mapName:"Ranko 22",
    channels:Array.from({length:10},(_,i)=>({
      ch:i+1,
      h:4,m:0,s:0,
      cd:DEFAULT_CD,
      start:null,
      phaseAlerted:0,
      readyAlerted:false
    }))
  };
}
function normalize(){
  if(!state.channels||state.channels.length!==10)makeDefault();
  state.channels.forEach((c,i)=>{
    c.ch=i+1;
    if(c.h===undefined)c.h=4;
    if(c.m===undefined)c.m=0;
    if(c.s===undefined)c.s=0;
    if(c.cd===undefined)c.cd=customCd(c);
    if(c.phaseAlerted===undefined)c.phaseAlerted=0;
    if(c.readyAlerted===undefined)c.readyAlerted=false;
  });
}
function load(){
  try{
    const old=JSON.parse(localStorage.getItem(APP_KEY)||"null");
    if(old&&Array.isArray(old.channels)){state=old}else makeDefault();
  }catch(e){makeDefault()}
  normalize();
  mapName.value=state.mapName||"Ranko 22";
}
function save(){
  state.mapName=mapName.value.trim()||"Untitled Map";
  localStorage.setItem(APP_KEY,JSON.stringify(state));
}
function customCd(c){
  const h=Number(c.h||0),m=Number(c.m||0),s=Number(c.s||0);
  const ms=((h*3600)+(m*60)+s)*1000;
  return ms>0?ms:DEFAULT_CD;
}
function info(c,now=Date.now()){
  if(!c.start){
    return {state:"idle",label:"IDLE",left:0,phase:0,progress:0,target:null,note:"ready to start"};
  }

  // v7.4 rule:
  // H/M/S is the TOTAL time until READY/เกิดจริง.
  // The final 20 minutes are displayed as Phase 1-4.
  const totalMs=c.cd||customCd(c);
  const elapsed=now-c.start;
  const left=totalMs-elapsed;
  const phaseTotal=PHASE_MS*PHASES;
  const target=c.start+totalMs;

  if(left>phaseTotal){
    return {
      state:"counting",
      label:"COUNTING",
      left,
      phase:0,
      progress:Math.max(0,Math.min(100,(elapsed/totalMs)*100)),
      target,
      note:"ก่อนเข้าเฟส"
    };
  }

  if(left>0){
    const phase=Math.floor((phaseTotal-left)/PHASE_MS)+1;
    return {
      state:"phase",
      label:"P"+phase,
      left,
      phase,
      progress:Math.max(0,Math.min(100,(elapsed/totalMs)*100)),
      target,
      note:phase<4?`กำลังเฟส ${phase}`:"เฟสสุดท้าย"
    };
  }

  return {
    state:"ready",
    label:"READY",
    left:0,
    phase:4,
    progress:100,
    target,
    note:"boss available"
  };
}
function createCards(){
  grid.innerHTML="";
  state.channels.forEach((c,i)=>{
    const card=document.createElement("article");
    card.className="panel card idle";
    card.id="card"+c.ch;
    card.innerHTML=`
      <div class="head">
        <div class="ch">CH${pad(c.ch)}</div>
        <div class="state"><span class="dot"></span><span id="state${c.ch}">IDLE</span></div>
      </div>
      <div class="time" id="time${c.ch}">READY</div>
      <div class="note" id="note${c.ch}">ready to start</div>
      <div class="progress"><div class="bar" id="bar${c.ch}"></div></div>
      <div class="phasebar">
        <div class="p" id="p${c.ch}_1">P1</div>
        <div class="p" id="p${c.ch}_2">P2</div>
        <div class="p" id="p${c.ch}_3">P3</div>
        <div class="p" id="p${c.ch}_4">P4</div>
      </div>
      <div class="cdEdit">
        <input inputmode="numeric" type="number" min="0" id="h${c.ch}" value="${(c.h===4&&c.m===0&&c.s===0)?"" : c.h}" placeholder="H" aria-label="CH${c.ch} hours">
        <input inputmode="numeric" type="number" min="0" id="m${c.ch}" value="${(c.h===4&&c.m===0&&c.s===0)?"" : c.m}" placeholder="M" aria-label="CH${c.ch} minutes">
        <input inputmode="numeric" type="number" min="0" id="s${c.ch}" value="${(c.h===4&&c.m===0&&c.s===0)?"" : c.s}" placeholder="S" aria-label="CH${c.ch} seconds">
      </div>
      <div class="actions">
        <button class="dead" id="dead${c.ch}">DEAD</button>
        <button class="adjust" id="minus${c.ch}">-5</button>
        <button class="adjust" id="plus${c.ch}">+5</button>
        <button class="reset" id="reset${c.ch}">↺</button>
      </div>
    `;
    grid.appendChild(card);

    ["h","m","s"].forEach(k=>{
      document.getElementById(k+c.ch).addEventListener("input",()=>{
        c.h=Number(document.getElementById("h"+c.ch).value||0);
        c.m=Number(document.getElementById("m"+c.ch).value||0);
        c.s=Number(document.getElementById("s"+c.ch).value||0);
        c.cd=customCd(c);

        // Manual time entry = start counting immediately from the entered time.
        // This keeps the old Boss Timer behavior while DEAD still works as quick-start.
        if(c.cd>0){
          c.start=Date.now();
          c.phaseAlerted=0;
          c.readyAlerted=false;
        }else{
          c.start=null;
        }

        save();
        render();
      });
    });

    document.getElementById("dead"+c.ch).onclick=()=>markDead(i);
    document.getElementById("reset"+c.ch).onclick=()=>resetCh(i);
    document.getElementById("minus"+c.ch).onclick=()=>adjust(i,-5*60*1000);
    document.getElementById("plus"+c.ch).onclick=()=>adjust(i,5*60*1000);
  });
}
function markDead(i){
  const c=state.channels[i];
  c.cd=customCd(c);
  c.start=Date.now();
  c.phaseAlerted=0;
  c.readyAlerted=false;
  save();
  render();
  notify(`CH${pad(c.ch)} started`);
}
function resetCh(i){
  const c=state.channels[i];
  c.start=null;
  c.phaseAlerted=0;
  c.readyAlerted=false;
  save();
  render();
  notify(`CH${pad(c.ch)} reset`);
}
function adjust(i,delta){
  const c=state.channels[i];
  if(!c.start){
    notify("CH not active");
    return;
  }

  // Remaining time = start + cooldown - now.
  // To add time, move start forward. To reduce time, move start backward.
  c.start+=delta;

  save();
  render();
  notify(delta>0?"+5 min":"-5 min");
}
function buildReport(){
  const rows=[];
  const ready=[];
  const timed=[];
  state.channels.forEach(c=>{
    const x=info(c);
    if(!c.start)return;
    if(x.state==="ready")ready.push(`CH${pad(c.ch)} - READY`);
    else timed.push({text:`CH${pad(c.ch)} - ${fmtTime(x.target)}`,target:x.target});
  });
  timed.sort((a,b)=>a.target-b.target);
  rows.push(mapName.value.trim()||"Untitled Map");
  rows.push("");
  rows.push(...ready,...timed.map(x=>x.text));
  return rows.length>2?rows.join("\n"):"NO ACTIVE CHANNELS";
}
async function copyReport(){
  const text=buildReport();
  if(text==="NO ACTIVE CHANNELS"){notify("Nothing to copy");return}
  try{
    await navigator.clipboard.writeText(text);
  }catch(e){
    const ta=document.createElement("textarea");
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
  }
  notify("Copied");
}
function render(){
  const now=new Date();
  const nowMs=now.getTime();
  document.getElementById("clock").textContent=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById("dateLine").textContent=now.toLocaleDateString("th-TH",{weekday:"short",year:"numeric",month:"short",day:"numeric"});

  let counting=0, phase=0, ready=0;
  let upcoming=[];

  state.channels.forEach(c=>{
    const x=info(c,nowMs);
    const card=document.getElementById("card"+c.ch);
    if(!card)return;
    card.className=`panel card ${x.state}`;
    document.getElementById("state"+c.ch).textContent=x.label;
    document.getElementById("time"+c.ch).textContent=x.state==="idle"||x.state==="ready"?"READY":fmtLeft(x.left);
    document.getElementById("note"+c.ch).textContent=x.note;
    document.getElementById("bar"+c.ch).style.width=x.progress+"%";

    for(let p=1;p<=4;p++){
      document.getElementById(`p${c.ch}_${p}`).classList.toggle("on",x.phase>=p);
    }

    if(x.state==="counting")counting++;
    if(x.state==="phase")phase++;
    if(x.state==="ready")ready++;
    if(c.start&&x.state!=="ready")upcoming.push({ch:c.ch,target:x.target});

    if(x.state==="phase"&&x.phase>c.phaseAlerted){
      c.phaseAlerted=x.phase;
      alertUser("Phase",`CH${pad(c.ch)} ${x.label}`,"phase");
      save();
    }
    if(x.state==="ready"&&!c.readyAlerted){
      c.readyAlerted=true;
      alertUser("READY",`CH${pad(c.ch)} พร้อมแล้ว`,"ready");
      save();
    }
  });

  upcoming.sort((a,b)=>a.target-b.target);
  document.getElementById("countingCount").textContent=counting;
  document.getElementById("phaseCount").textContent=phase;
  document.getElementById("readyCount").textContent=ready;
  document.getElementById("nextInfo").textContent=upcoming.length?`CH${pad(upcoming[0].ch)} ${fmtTime(upcoming[0].target)}`:"--";
  report.textContent=buildReport();
}

document.getElementById("soundBtn").onclick=async()=>{
  beep();
  if("Notification"in window&&Notification.permission==="default"){
    await Notification.requestPermission();
  }
  notify("Sound armed");
};
