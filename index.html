<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TOSM Boss Monitor</title>
  <style>
    :root{
      --bg:#060a12;--panel:#0d1424;--panel2:#10192b;--card:#0b1220;--line:#1c2942;
      --text:#e8eefc;--muted:#8996ad;--orange:#f59e0b;--violet:#6d5dfc;--green:#10bfa5;--red:#ff5b7a;
      --shadow:0 18px 45px rgba(0,0,0,.35);--radius:16px
    }
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 30% 0,#101933 0,#070b13 42%,#05080e 100%);color:var(--text);font-family:Inter,"Segoe UI",Tahoma,sans-serif;font-size:14px}
    .wrap{max-width:1220px;margin:auto;padding:28px}
    .top{display:flex;align-items:center;gap:18px;background:linear-gradient(180deg,#111a2d,#0b1220);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow);position:relative}
    .logo{font-size:30px}.title h1{font-size:24px;margin:0;color:var(--orange);letter-spacing:.2px}.badge{font-size:11px;background:#4b360d;color:#ffc76b;border:1px solid #76510b;border-radius:7px;padding:5px 8px;margin-left:8px}.title p{margin:5px 0 0;color:var(--muted)}
    .actions{margin-left:auto;display:flex;gap:10px}.btn,.input,select{border:1px solid var(--line);background:#090f1e;color:var(--text);border-radius:10px;padding:11px 14px}.btn{cursor:pointer;font-weight:700;transition:.15s}.btn:hover{transform:translateY(-1px);filter:brightness(1.08)}.primary{background:linear-gradient(135deg,#5a4cf4,#7a63ff);border-color:#8676ff}.orange{background:linear-gradient(135deg,#ffae13,#f28b00);border:0;color:#111}.green{background:#0fae98;border:0}.small{font-size:12px;padding:7px 10px}.ghost{background:#0b1220}.danger{color:#ff7d96}
    .toolbar{margin:20px 0;display:flex;align-items:center;gap:12px;background:#0b1220;border:1px solid var(--line);border-radius:12px;padding:14px}.search{width:280px}.spacer{flex:1}.sort{display:flex;gap:8px;align-items:center;color:var(--muted)}
    .grid{display:grid;grid-template-columns:350px 1fr;gap:20px}.panel,.boss{background:rgba(13,20,36,.95);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.panel{padding:18px;height:max-content}.panel h2{font-size:16px;color:var(--orange);margin:0 0 16px;border-bottom:1px solid var(--line);padding-bottom:14px}.field{margin:13px 0}.field label{display:block;color:var(--muted);font-weight:700;font-size:12px;margin-bottom:8px}.field input,.field select{width:100%}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{width:100%;margin-top:12px}
    .boss{display:grid;grid-template-columns:210px 1fr;gap:16px;padding:16px;margin-bottom:14px}.info{border-right:1px solid var(--line);padding-right:16px}.name{font-size:17px;font-weight:900}.sub{font-size:12px;color:var(--muted);margin:4px 0 10px}.pill{display:inline-flex;align-items:center;gap:6px;background:#0b1425;border:1px solid #1e2b45;border-radius:8px;padding:5px 8px;font-size:11px;color:#ffc15c;margin:0 4px 8px 0}.level{float:left;background:#17233a;border:1px solid #263657;border-radius:10px;padding:8px;text-align:center;margin-right:10px}.level b{color:#fbbf24}.infoActions{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}.channels{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:10px}.channel{position:relative;background:#080e1b;border:1px solid #283650;border-radius:11px;padding:10px;min-height:92px}.channel.dead{border-color:#46516a;background:#0a1020}.chHead{display:flex;justify-content:space-between;font-size:11px;color:#8794aa}.dot{width:7px;height:7px;border-radius:50%;background:#17d0aa;box-shadow:0 0 10px #17d0aa}.time{font-size:14px;color:var(--orange);font-weight:900;margin:11px 0;text-align:center}.cd{font-size:10px;color:#53627b;text-align:center}.channel .green{width:100%;margin:3px 0 8px}.mini{display:flex;gap:5px}.mini button{flex:1;padding:5px;border-radius:7px;border:1px solid #263657;background:#111b30;color:#8fa0bc;font-size:11px;cursor:pointer}.mini button:hover{color:#fff}.empty{padding:40px;text-align:center;color:var(--muted);border:1px dashed #263657;border-radius:16px;background:#0a1020}
    .toast{position:fixed;right:20px;top:20px;max-width:360px;background:#0b1220;border:1px solid #96a0ba;border-radius:12px;padding:15px 18px;box-shadow:var(--shadow);z-index:9}.toast b{color:#fff}.toast p{color:#c5cce0;margin:6px 0 0;font-size:13px}.hidden{display:none}.browserToast{position:fixed;right:18px;bottom:18px;background:#2b2b2b;color:#fff;border-radius:2px;padding:18px 22px;box-shadow:var(--shadow);display:flex;gap:16px;align-items:center;min-width:310px}.bell{font-size:42px;color:#111;text-shadow:0 1px 0 #555}.close{position:absolute;right:10px;top:8px;background:0;border:0;color:#9aa5b8;font-size:18px;cursor:pointer}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.boss{grid-template-columns:1fr}.info{border-right:0;border-bottom:1px solid var(--line);padding-bottom:12px}.channels{grid-template-columns:repeat(2,1fr)}.actions{display:none}.toolbar{flex-wrap:wrap}.search{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="logo">⚔️</div><div class="title"><h1>TOSM BOSS MONITOR <span class="badge">V6.5 PRO</span></h1><p>ระบบบันทึกเวลาบอสไทย และนับถอยหลังพร้อมแจ้งเตือน</p></div>
      <div class="actions"><button class="btn primary" id="enableNotify">🧪 ทดสอบระบบแจ้งเตือน</button><input class="input" id="webhook" placeholder="Discord Webhook URL"></div>
    </header>
    <div class="toolbar"><span>🔍 ค้นหาเร็ว:</span><input class="input search" id="search" placeholder="ค้นหา ชื่อบอส, แผนที่ หรือเลเวล"><span class="spacer"></span><div class="sort">📊 จัดเรียงหน้าจอ:<button class="btn orange small" data-sort="level">ตามค่าระดับ</button><button class="btn ghost small" data-sort="time">⏳ เรียงตามเวลาที่เกิดใกล้สุด</button></div></div>
    <main class="grid">
      <aside class="panel"><h2>➕ เพิ่มข้อมูลบอสเรดรอบบอส</h2>
        <div class="field"><label>ชื่อบอส (Boss Name)</label><input class="input" id="bossName" placeholder="เช่น Kepuri"></div>
        <div class="field"><label>แผนที่เกิดบอส (Map)</label><input class="input" id="bossMap" placeholder="เช่น West Siauliai Woods"></div>
        <div class="two"><div class="field"><label>เผ่า (Race)</label><input class="input" id="race" value="Insect"></div><div class="field"><label>ธาตุ (Element)</label><input class="input" id="element" value="Earth"></div></div>
        <div class="two"><div class="field"><label>เลเวลแนะนำ (Lv.)</label><input class="input" id="level" type="number" value="15"></div><div class="field"><label>จุดดาวน์หลัก (นาที)</label><input class="input" id="respawn" type="number" value="120"></div></div>
        <div class="field"><label>จำนวน Channel ทั้งหมด</label><input class="input" id="channels" type="number" value="4" min="1" max="12"></div>
        <button class="btn orange full" id="saveBoss">💾 บันทึกข้อมูลบอสไฟล์ JSON</button>
      </aside>
      <section id="list"></section>
    </main>
  </div>
  <div class="toast hidden" id="toast"><button class="close" onclick="toast.classList.add('hidden')">×</button><b>⚔️ ทดสอบระบบ IN-APP POPUP</b><p id="toastText">หากคุณเห็นกล่องข้อความนี้ แปลว่าแจ้งเตือนทำงานแล้ว</p></div>
  <div class="browserToast hidden" id="browserToast"><div class="bell">🔔</div><div><b>เปิดระบบภายนอกสำเร็จ</b><br><small>เบราว์เซอร์ของคุณเปิดสิทธิ์ให้แจ้งเตือนระบบเดสก์ท็อปแล้ว</small></div><button class="close" onclick="browserToast.classList.add('hidden')">×</button></div>
<script>
const $=id=>document.getElementById(id);
const seed=[
 {name:'Indignant Solcom',map:'ดันเจี้ยน Rank 22',race:'Devil',element:'Water',level:133,respawn:1440,channels:10,times:[13623,5999,7132,14114,0,1227,2596,12969,13876,12551]},
 {name:'Strong Rajatoad',map:'อาณาจักร Epherota',race:'Mutant',element:'ทั่วไป',level:130,respawn:1440,channels:8,times:[0,0,0,0,0,0,0,0]}
];
let bosses=JSON.parse(localStorage.tosmBosses||'null')||seed;
let sortMode='level';
function fmt(sec){sec=Math.max(0,Math.floor(sec));let h=String(Math.floor(sec/3600)).padStart(2,'0'),m=String(Math.floor(sec%3600/60)).padStart(2,'0'),s=String(sec%60).padStart(2,'0');return `${h}:${m}:${s}`}
function showToast(txt){toastText.textContent=txt;toast.classList.remove('hidden');setTimeout(()=>toast.classList.add('hidden'),5000)}
function save(){localStorage.tosmBosses=JSON.stringify(bosses)}
function render(){
 let q=search.value.toLowerCase();let arr=[...bosses].filter(b=>(b.name+b.map+b.level).toLowerCase().includes(q));
 if(sortMode==='level')arr.sort((a,b)=>b.level-a.level);else arr.sort((a,b)=>Math.min(...a.times.filter(Boolean),999999)-Math.min(...b.times.filter(Boolean),999999));
 list.innerHTML=arr.length?'':'<div class="empty">ยังไม่มีข้อมูลบอส</div>';
 arr.forEach((b,bi)=>{let realIndex=bosses.indexOf(b);let cards='';for(let i=0;i<b.channels;i++){let t=b.times[i]||0;cards+=`<div class="channel ${t?'':'dead'}"><div class="chHead"><span>CH ${i+1}</span><span>${t?'<span class="danger">ล้าง</span>':'<span class="dot"></span>'}</span></div>${t?`<div class="time">⌛ ${fmt(t)}</div><div class="cd">CD: ${b.respawn}น.</div>`:`<button class="btn green small" onclick="markDead(${realIndex},${i})">ตาย</button><div class="mini"><button onclick="adjust(${realIndex},${i},-3600)">-1ชม.</button><button onclick="adjust(${realIndex},${i},-10800)">-3ชม.</button><button onclick="adjust(${realIndex},${i},-18000)">-5ชม.</button></div>`}</div>`}
 list.innerHTML+=`<article class="boss"><div class="info"><div class="level">LV<br><b>${b.level}</b></div><div class="name">${b.name}</div><div class="sub">📍 ${b.map}</div><span class="pill">🗡️ ${b.race}</span><span class="pill">💧 ${b.element}</span><div class="infoActions"><button class="btn orange small" onclick="report(${realIndex})">📋 รายงานคือ</button><button class="btn ghost small" onclick="editBoss(${realIndex})">⚙️</button><button class="btn ghost small" onclick="deleteBoss(${realIndex})">ลบ</button></div></div><div class="channels">${cards}</div></article>`;
 });
}
function markDead(bi,ci){let b=bosses[bi];b.times[ci]=b.respawn*60;save();render();showToast(`${b.name} CH ${ci+1} ถูกบันทึกเวลาตายแล้ว`)}
function adjust(bi,ci,sec){bosses[bi].times[ci]=Math.max(0,(bosses[bi].times[ci]||bosses[bi].respawn*60)+sec);save();render()}
function deleteBoss(i){if(confirm('ลบบอสนี้ใช่ไหม?')){bosses.splice(i,1);save();render()}}
function editBoss(i){let b=bosses[i];bossName.value=b.name;bossMap.value=b.map;race.value=b.race;element.value=b.element;level.value=b.level;respawn.value=b.respawn;channels.value=b.channels;deleteBoss(i)}
function report(i){let b=bosses[i];showToast(`รายงาน ${b.name}: ${b.channels} CH, เกิดใกล้สุด ${fmt(Math.min(...b.times.filter(Boolean),0)||0)}`)}
function downloadJSON(){let blob=new Blob([JSON.stringify(bosses,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tosm-boss-data.json';a.click()}
saveBoss.onclick=()=>{let ch=+channels.value||1;bosses.push({name:bossName.value||'Unknown Boss',map:bossMap.value||'-',race:race.value||'-',element:element.value||'-',level:+level.value||1,respawn:+respawn.value||120,channels:ch,times:Array(ch).fill(0)});save();render();downloadJSON();showToast('บันทึกบอสใหม่เรียบร้อยแล้ว')}
enableNotify.onclick=async()=>{showToast('หากคุณเห็นกล่องนี้ แปลว่าระบบแจ้งเตือนหลักทำงานแล้วครับ');browserToast.classList.remove('hidden');if('Notification'in window){try{await Notification.requestPermission();if(Notification.permission==='granted')new Notification('เปิดระบบภายนอกสำเร็จ',{body:'ระบบแจ้งเตือนเดสก์ท็อปพร้อมใช้งานแล้ว'});}catch(e){}}}
search.oninput=render;document.querySelectorAll('[data-sort]').forEach(b=>b.onclick=()=>{sortMode=b.dataset.sort;render()});
setInterval(()=>{let ping=false;bosses.forEach(b=>b.times=b.times.map(t=>{if(t>0&&t<=2&&!ping){showToast(`${b.name} กำลังจะเกิดแล้ว!`);ping=true}return Math.max(0,t-1)}));save();render()},1000);
render();
</script>
</body>
</html>
